version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
          disabled: false
        - name: var-naming
        - name: indent-error-flow
        - name: if-return
        - name: superfluous-else
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive
          - gocritic
      # MergeError is part of the public API; renaming to fix the stutter
      # would be a breaking change.
      - path: merge/errors\.go
        text: "type name will be used as merge.MergeError"
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/irajhedayati/go-oapi-merge
